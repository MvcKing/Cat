<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCut AI - 全自動智慧影片切片系統</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 24px;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .upload-zone {
            border: 3px dashed var(--border);
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            display: none;
            margin-bottom: 16px;
        }

        video {
            width: 100%;
            height: 100%;
        }

        /* 進度條與狀態 */
        .analysis-status {
            display: none;
            margin-top: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.1s ease;
        }

        /* 參數控制區 */
        .config-panel {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .config-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select, input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        /* 右側切片列表 */
        .sidebar {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            position: sticky;
            top: 24px;
        }

        .segment-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .segment-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            background: #f8fafc;
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .segment-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .segment-thumb {
            width: 120px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 4px;
            object-fit: cover;
        }

        .segment-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .segment-title {
            font-weight: bold;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .segment-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 20px;
        }

        #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>🤖 AutoCut AI 全自動智慧影片切片系統</h1>
        <button id="exportBtn" class="btn-primary" style="background: var(--success);" disabled>📦 匯出自動切片清單</button>
    </header>

    <div class="main-container">
        <!-- 左側：控制與解析工作區 -->
        <div class="left-column">
            <div class="card">
                <!-- 上傳區 -->
                <div class="upload-zone" id="dropZone">
                    <h2>📥 拖曳影片檔案至此處，或點擊上傳</h2>
                    <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">系統將自動解析影片長度並智慧偵測分鏡切點</p>
                    <input type="file" id="videoInput" style="display: none;" accept="video/*">
                </div>

                <!-- 影片播放器 -->
                <div class="video-wrapper" id="videoWrapper">
                    <video id="mainVideo" controls></video>
                </div>

                <!-- 運算設定面板（上傳後可微調） -->
                <div class="config-panel" id="configPanel" style="display: none;">
                    <div class="config-group">
                        <label>🎬 偵測靈敏度 (場景變更閾值)</label>
                        <select id="sensitivity">
                            <option value="15">高靈敏度 (適合直播、細微畫面變動)</option>
                            <option value="25" selected>標準偵測 (推薦，一般影片)</option>
                            <option value="40">低靈敏度 (只抓超大畫面切換、換幕)</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label>⏱️ 最小片段長度限制</label>
                        <select id="minDuration">
                            <option value="2">至少 2 秒</option>
                            <option value="5" selected>至少 5 秒</option>
                            <option value="10">至少 10 秒</option>
                        </select>
                    </div>
                    <div class="config-group" style="grid-column: span 2; margin-top: 8px;">
                        <button id="startAnalysisBtn" class="btn-primary">⚡ 開始全自動分析與切片</button>
                    </div>
                </div>

                <!-- 分析進度條 -->
                <div class="analysis-status" id="analysisStatus">
                    <div style="display: flex; justify-content: space-between; font-weight: 600;">
                        <span id="statusText">AI 影像核心分析中...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBarFill"></div>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 6px;">
                        系統正以毫秒級速度抽樣全片影格，比對前後像素差值以自動生成重點節點。
                    </p>
                </div>
            </div>
        </div>

        <!-- 右側：自動生成片段成果區 -->
        <div class="card sidebar">
            <h2>📌 自動生成片段 (<span id="segmentCount">0</span>)</h2>
            <div class="segment-list" id="segmentList">
                <div class="empty-state" id="emptyState">
                    尚未載入影片。上傳後系統將自動掃描並在此處生成節點清單。
                </div>
            </div>
        </div>
    </div>

    <!-- 用於背景像素比對與抓取縮圖的隱藏 Canvas -->
    <canvas id="hiddenCanvas"></canvas>

    <script>
        let videoFile = null;
        let automaticSegments = [];
        
        // DOM 元素
        const dropZone = document.getElementById('dropZone');
        const videoInput = document.getElementById('videoInput');
        const mainVideo = document.getElementById('mainVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const configPanel = document.getElementById('configPanel');
        const startAnalysisBtn = document.getElementById('startAnalysisBtn');
        const analysisStatus = document.getElementById('analysisStatus');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercent = document.getElementById('progressPercent');
        const statusText = document.getElementById('statusText');
        const segmentList = document.getElementById('segmentList');
        const emptyState = document.getElementById('emptyState');
        const segmentCount = document.getElementById('segmentCount');
        const exportBtn = document.getElementById('exportBtn');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        // 上傳綁定
        dropZone.addEventListener('click', () => videoInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) initVideo(e.dataTransfer.files[0]);
        });
        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) initVideo(e.target.files[0]);
        });

        // 初始化影片
        function initVideo(file) {
            videoFile = file;
            mainVideo.src = URL.createObjectURL(file);
            dropZone.style.display = 'none';
            videoWrapper.style.display = 'block';
            configPanel.style.display = 'grid';
            
            mainVideo.onloadedmetadata = () => {
                statusText.textContent = `影片載入成功！總長度：${formatTime(mainVideo.duration)}。點擊下方按鈕開始自動分析。`;
                analysisStatus.style.display = 'block';
                progressBarFill.style.style = '0%';
                progressPercent.textContent = '0%';
            };
        }

        // 核心演算法：全自動高速影格掃描與分鏡偵測
        async function runAutoSegmentation() {
            startAnalysisBtn.disabled = true;
            segmentList.innerHTML = '<div class="empty-state">分析中，請稍候...</div>';
            
            const duration = mainVideo.duration;
            const sampleRate = 0.5; // 每 0.5 秒抽樣一次畫面，兼顧精準度與運算速度
            const threshold = parseFloat(document.getElementById('sensitivity').value);
            const minSegDuration = parseFloat(document.getElementById('minDuration').value);
            
            automaticSegments = [];
            let lastFrameData = null;
            let lastCutTime = 0;

            // 設置隱藏 Canvas 尺寸用於計算
            hiddenCanvas.width = 160;
            hiddenCanvas.height = 90;

            for (let time = 0; time < duration; time += sampleRate) {
                // 強制讓影片核心跳轉到指定時間點（隱藏在背景）
                mainVideo.currentTime = time;
                await new Promise(r => mainVideo.onseeked = r);

                // 將畫面繪製到 Canvas
                ctx.drawImage(mainVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                const currentFrameData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height).data;

                if (lastFrameData) {
                    // 計算前後影格的色彩差異度 (RGB 絕對誤差平均值)
                    let totalDiff = 0;
                    for (let i = 0; i < currentFrameData.length; i += 4) {
                        totalDiff += Math.abs(currentFrameData[i] - lastFrameData[i]);     // R
                        totalDiff += Math.abs(currentFrameData[i+1] - lastFrameData[i+1]); // G
                        totalDiff += Math.abs(currentFrameData[i+2] - lastFrameData[i+2]); // B
                    }
                    const pixelCount = hiddenCanvas.width * hiddenCanvas.height;
                    const averageDiff = totalDiff / (pixelCount * 3);

                    // 如果差異度高於閾值，且與上一個切點距離大於限制，則自動判定為新節點
                    if (averageDiff > threshold && (time - lastCutTime) >= minSegDuration) {
                        
                        // 擷取當前畫面作為節點縮圖
                        const thumbnail = hiddenCanvas.toDataURL('image/jpeg', 0.6);
                        
                        automaticSegments.push({
                            id: automaticSegments.length + 1,
                            startTime: lastCutTime,
                            endTime: time,
                            thumbnail: thumbnail
                        });
                        lastCutTime = time;
                    }
                }

                lastFrameData = currentFrameData;

                // 更新進度條介面
                const percent = Math.floor((time / duration) * 100);
                progressBarFill.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                statusText.textContent = `正在全自動分析全片影格... 已掃描 ${formatTime(time)} / ${formatTime(duration)}`;
            }

            // 收尾：將最後一個片段補齊到影片結束
            if (duration - lastCutTime > 2) {
                ctx.drawImage(mainVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                automaticSegments.push({
                    id: automaticSegments.length + 1,
                    startTime: lastCutTime,
                    endTime: duration,
                    thumbnail: hiddenCanvas.toDataURL('image/jpeg', 0.6)
                });
            }

            // 分析完成，渲染結果
            statusText.textContent = `✨ 全自動切片完成！共自動識別出 ${automaticSegments.length} 個場景片段。`;
            progressBarFill.style.width = '100%';
            progressPercent.textContent = '100%';
            startAnalysisBtn.disabled = false;
            exportBtn.disabled = false;
            
            renderAutoSegments();
        }

        startAnalysisBtn.addEventListener('click', runAutoSegmentation);

        // 渲染生成片段至介面
        function renderAutoSegments() {
            segmentList.innerHTML = '';
            segmentCount.textContent = automaticSegments.length;

            if (automaticSegments.length === 0) {
                segmentList.innerHTML = '<div class="empty-state">未能偵測到明顯斷點，請嘗試提高靈敏度重試。</div>';
                return;
            }

            automaticSegments.forEach(seg => {
                const card = document.createElement('div');
                card.className = 'segment-card';
                card.innerHTML = `
                    <img class="segment-thumb" src="${seg.thumbnail}" alt="縮圖">
                    <div class="segment-info">
                        <div class="segment-title">🎬 自動片段 #${seg.id}</div>
                        <div class="segment-meta">時間軸: ${formatTime(seg.startTime)} - ${formatTime(seg.endTime)}</div>
                        <div class="segment-meta">總長度: ${(seg.endTime - seg.startTime).toFixed(1)} 秒</div>
                    </div>
                `;

                // 點擊片段，左側影片直接跳轉過去播放
                card.addEventListener('click', () => {
                    mainVideo.currentTime = seg.startTime;
                    mainVideo.play();
                });

                segmentList.appendChild(card);
            });
        }

        // 時間格式化工具
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // JSON 資料匯出
        exportBtn.addEventListener('click', () => {
            const output = {
                fileName: videoFile.name,
                analysisTime: new Date().toISOString(),
                totalSegmentsFound: automaticSegments.length,
                segments: automaticSegments.map(s => ({
                    id: s.id,
                    startTime: s.startTime,
                    endTime: s.endTime,
                    durationSeconds: parseFloat((s.endTime - s.startTime).toFixed(2))
                }))
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(output, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `auto_cuts_${Date.now()}.json`);
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        });
    </script>
</body>
</html>

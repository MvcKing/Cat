<!DOCTYPE html>
<script src="coi-serviceworker.js"></script>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCut Pro - 產品介紹影片自動切片系統</title>
    <!-- 引入 FFmpeg.wasm 核心與工具庫 -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --border: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 480px;
            gap: 24px;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .upload-zone {
            border: 3px dashed var(--border);
            padding: 60px 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            display: none;
            margin-bottom: 16px;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .analysis-status {
            display: none;
            margin-top: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.1s ease;
        }

        .config-panel {
            margin-top: 16px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 8px;
        }

        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .config-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
            background: white;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: var(--success-hover); }
        .btn-success:disabled { background: #94a3b8; cursor: not-allowed; }

        .sidebar {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            position: sticky;
            top: 24px;
        }

        .segment-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .segment-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            background: #f8fafc;
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 12px;
            align-items: center;
            transition: border-color 0.2s;
        }

        .segment-card:hover {
            border-color: var(--primary);
        }

        .segment-thumb-container {
            position: relative;
            cursor: pointer;
        }

        .segment-thumb {
            width: 120px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 4px;
            object-fit: cover;
            display: block;
        }

        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.2s;
            border-radius: 4px;
        }

        .segment-thumb-container:hover .play-overlay {
            opacity: 1;
        }

        .segment-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .segment-title {
            font-weight: bold;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .segment-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .action-area {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .action-area button {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .empty-state {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 20px;
        }

        #hiddenCanvas { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>📦 AutoCut Pro 產品介紹影片自動切片系統</h1>
        <div style="font-size: 0.9rem; background: #e2e8f0; padding: 6px 12px; border-radius: 20px; font-weight: 600;" id="ffmpegStatus">
            ⏳ 正在初始化網頁端剪輯核心...
        </div>
    </header>

    <div class="main-container">
        <!-- 左側：控制與解析工作區 -->
        <div class="left-column">
            <div class="card">
                <!-- 上傳區 -->
                <div class="upload-zone" id="dropZone">
                    <h2>📥 拖曳產品介紹/直播影片至此處，或點擊上傳</h2>
                    <p style="color: var(--text-muted); margin-top: 8px; font-size: 0.9rem;">系統將自動以黃金可看性長度（30-100秒）進行產品節點智慧切片</p>
                    <input type="file" id="videoInput" style="display: none;" accept="video/*">
                </div>

                <!-- 影片播放器 -->
                <div class="video-wrapper" id="videoWrapper">
                    <video id="mainVideo" controls></video>
                </div>

                <!-- 運算設定面板 -->
                <div class="config-panel" id="configPanel" style="display: none;">
                    <div class="config-group">
                        <label>🎬 偵測靈敏度 (顏色變化強度)</label>
                        <select id="sensitivity">
                            <option value="12">高靈敏度 (抓細微字卡或商品變動)</option>
                            <option value="20" selected>標準偵測 (推薦，適合多數產品介紹)</option>
                            <option value="30">低靈敏度 (只抓大畫面、棚景切換)</option>
                        </select>
                    </div>
                    <div class="config-group">
                        <label>⏳ 最小片段長度限制 (確保介紹完整性)</label>
                        <select id="minDuration">
                            <option value="30" selected>🎬 至少 30 秒 (精煉產品短影音)</option>
                            <option value="60">🎬 至少 60 秒 (標準產品詳細介紹)</option>
                            <option value="100">🎬 至少 100 秒 (深度內容/完整開箱)</option>
                        </select>
                    </div>
                    <div class="config-group" style="grid-column: span 2; margin-top: 8px;">
                        <button id="startAnalysisBtn" class="btn-primary" disabled>⚡ 請靜候核心載入...</button>
                    </div>
                </div>

                <!-- 分析進度條 -->
                <div class="analysis-status" id="analysisStatus">
                    <div style="display: flex; justify-content: space-between; font-weight: 600;">
                        <span id="statusText">正在初始化影片...</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBarFill"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側：自動生成片段成果區 -->
        <div class="card sidebar">
            <h2>📌 已生成高觀賞性產品片段 (<span id="segmentCount">0</span>)</h2>
            <div class="segment-list" id="segmentList">
                <div class="empty-state" id="emptyState">
                    尚未載入影片。請先上傳影片並執行全自動智慧分析。
                </div>
            </div>
        </div>
    </div>

    <!-- 用於背景像素比對的隱藏 Canvas -->
    <canvas id="hiddenCanvas"></canvas>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        let ffmpeg = null;
        let videoFile = null;
        let automaticSegments = [];
        let objectUrl = null;
        
        // DOM 元素
        const dropZone = document.getElementById('dropZone');
        const videoInput = document.getElementById('videoInput');
        const mainVideo = document.getElementById('mainVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const configPanel = document.getElementById('configPanel');
        const startAnalysisBtn = document.getElementById('startAnalysisBtn');
        const analysisStatus = document.getElementById('analysisStatus');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercent = document.getElementById('progressPercent');
        const statusText = document.getElementById('statusText');
        const segmentList = document.getElementById('segmentList');
        const emptyState = document.getElementById('emptyState');
        const segmentCount = document.getElementById('segmentCount');
        const ffmpegStatus = document.getElementById('ffmpegStatus');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');

        // 1. 初始化 FFmpeg.wasm 核心
        async function initFFmpeg() {
            try {
                ffmpeg = createFFmpeg({ log: false });
                await ffmpeg.load();
                ffmpegStatus.textContent = "✅ 網頁端剪輯核心已就緒";
                ffmpegStatus.style.background = "#d1fae5";
                ffmpegStatus.style.color = "#065f46";
                if(videoFile) startAnalysisBtn.disabled = false;
                startAnalysisBtn.textContent = "⚡ 開始全自動分析與切片";
            } catch (err) {
                console.error(err);
                ffmpegStatus.textContent = "❌ 核心載入失敗 (請確認於 localhost 或 HTTPS 環境執行)";
                ffmpegStatus.style.background = "#fee2e2";
                ffmpegStatus.style.color = "#991b1b";
            }
        }
        initFFmpeg();

        // 2. 檔案上傳與拖曳處理
        dropZone.addEventListener('click', () => videoInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) initVideo(e.dataTransfer.files[0]);
        });
        videoInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) initVideo(e.target.files[0]);
        });

        function initVideo(file) {
            videoFile = file;
            objectUrl = URL.createObjectURL(file);
            mainVideo.src = objectUrl;
            dropZone.style.display = 'none';
            videoWrapper.style.display = 'block';
            configPanel.style.display = 'grid';
            
            mainVideo.onloadedmetadata = () => {
                statusText.textContent = `影片載入成功！總長度：${formatTime(mainVideo.duration)}。`;
                analysisStatus.style.display = 'block';
                if (ffmpeg && ffmpeg.isLoaded()) {
                    startAnalysisBtn.disabled = false;
                }
            };
        }

        // 3. 全新重構：安全且不卡死的背景影格解析演算法
        async function runAutoSegmentation() {
            startAnalysisBtn.disabled = true;
            segmentList.innerHTML = '<div class="empty-state">正在啟動背景獨立解碼掃描，請稍候...</div>';
            
            const duration = mainVideo.duration;
            const sampleRate = 1.0; // 每 1 秒抽樣一次影格
            const threshold = parseFloat(document.getElementById('sensitivity').value);
            const minSegDuration = parseFloat(document.getElementById('minDuration').value);
            
            automaticSegments = [];
            let lastFrameData = null;
            let lastCutTime = 0;

            hiddenCanvas.width = 100;
            hiddenCanvas.height = 56; // 降解析度提高效能與比對精準度

            // 建立一個完全獨立的隱藏 Video 物件，專門用來抽取像素，避免動到主播放器
            const scanVideo = document.createElement('video');
            scanVideo.src = objectUrl;
            scanVideo.muted = true;
            scanVideo.playsInline = true;
            
            await new Promise(r => scanVideo.onloadedmetadata = r);

            // 採用時間推進的 Promise 遞迴調用，徹底防止 Loop 阻塞執行緒
            for (let time = 0; time < duration; time += sampleRate) {
                // 1. 叫隱藏影片跳轉到指定秒數
                scanVideo.currentTime = time;
                
                // 2. 嚴格等待該時間點的影格解碼完畢
                await new Promise((resolve) => {
                    scanVideo.onseeked = resolve;
                });

                // 3. 給予核心輕微緩衝時間，確保渲染管線已將資料寫入快取
                await new Promise(r => setTimeout(r, 10));

                // 4. 繪製到 Canvas 並提取 RGB 像素
                ctx.drawImage(scanVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                const currentFrameData = ctx.getImageData(0, 0, hiddenCanvas.width, hiddenCanvas.height).data;

                if (lastFrameData) {
                    let totalDiff = 0;
                    // 優化加速：跳躍式步長像素比對，降低 CPU 負擔
                    for (let i = 0; i < currentFrameData.length; i += 8) {
                        totalDiff += Math.abs(currentFrameData[i] - lastFrameData[i]);       // R
                        totalDiff += Math.abs(currentFrameData[i+1] - lastFrameData[i+1]);   // G
                        totalDiff += Math.abs(currentFrameData[i+2] - lastFrameData[i+2]);   // B
                    }
                    const averageDiff = totalDiff / (hiddenCanvas.width * hiddenCanvas.height * 1.5);

                    // 條件觸發：當像素差異大於敏感度，且距離上一個切點大於使用者設定的最短規格(30s/60s/100s)
                    if (averageDiff > threshold && (time - lastCutTime) >= minSegDuration) {
                        const thumbnail = hiddenCanvas.toDataURL('image/jpeg', 0.6);
                        automaticSegments.push({
                            id: automaticSegments.length + 1,
                            startTime: lastCutTime,
                            endTime: time,
                            thumbnail: thumbnail
                        });
                        lastCutTime = time;
                    }
                }
                lastFrameData = currentFrameData;

                // 5. 更新前台進度條
                const percent = Math.floor((time / duration) * 100);
                progressBarFill.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                statusText.textContent = `智慧分析產品節點中... 已掃描 ${formatTime(time)} / ${formatTime(duration)}`;
            }

            // 收尾：補齊最後一段產品的介紹尾巴
            if (duration - lastCutTime >= 5) {
                automaticSegments.push({
                    id: automaticSegments.length + 1,
                    startTime: lastCutTime,
                    endTime: duration,
                    thumbnail: hiddenCanvas.toDataURL('image/jpeg', 0.6)
                });
            }

            // 釋放記憶體
            scanVideo.src = "";
            scanVideo.load();

            statusText.textContent = `✨ 產品切片解析完成！成功產出 ${automaticSegments.length} 個高觀賞性片段。`;
            progressBarFill.style.width = '100%';
            progressPercent.textContent = '100%';
            startAnalysisBtn.disabled = false;
            
            renderAutoSegments();
        }

        startAnalysisBtn.addEventListener('click', runAutoSegmentation);

        // 4. 渲染生成的片段與下載按鈕
        function renderAutoSegments() {
            segmentList.innerHTML = '';
            segmentCount.textContent = automaticSegments.length;

            if (automaticSegments.length === 0) {
                segmentList.innerHTML = '<div class="empty-state">❌ 在目前的靈敏度下未能識別出切點。由於限制了最小片段長度，建議調高靈敏度（或選擇「高靈敏度」）再重試一次！</div>';
                return;
            }

            automaticSegments.forEach(seg => {
                const card = document.createElement('div');
                card.className = 'segment-card';
                card.innerHTML = `
                    <div class="segment-thumb-container" data-start="${seg.startTime}">
                        <img class="segment-thumb" src="${seg.thumbnail}">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="segment-info">
                        <div class="segment-title">📦 產品片段 #${seg.id}</div>
                        <div class="segment-meta">時間軸: ${formatTime(seg.startTime)} - ${formatTime(seg.endTime)}</div>
                        <div class="segment-meta">片段總長: ${(seg.endTime - seg.startTime).toFixed(1)} 秒</div>
                        <div class="action-area">
                            <button class="btn-success btn-download" data-id="${seg.id}" data-start="${seg.startTime}" data-end="${seg.endTime}">📥 下載此片段</button>
                        </div>
                    </div>
                `;

                // 點擊縮圖：主播放器直接跳轉預覽
                card.querySelector('.segment-thumb-container').addEventListener('click', () => {
                    mainVideo.currentTime = seg.startTime;
                    mainVideo.play();
                });

                // 點擊下載
                card.querySelector('.btn-download').addEventListener('click', async (e) => {
                    const btn = e.target;
                    const id = btn.dataset.id;
                    const start = parseFloat(btn.dataset.start);
                    const end = parseFloat(btn.dataset.end);
                    
                    await downloadSegment(id, start, end, btn);
                });

                segmentList.appendChild(card);
            });
        }

        // 5. 核心剪輯模組：利用 FFmpeg.wasm 進行無損高速切片下載
        async function downloadSegment(id, startTime, endTime, buttonElement) {
            if (!ffmpeg || !ffmpeg.isLoaded()) {
                alert("剪輯核心尚未就緒。");
                return;
            }

            const originalBtnText = buttonElement.textContent;
            buttonElement.disabled = true;
            buttonElement.textContent = "⚡ 正在無損切片...";
            buttonElement.style.background = "#6366f1";

            try {
                const inputName = 'input_product_video.mp4';
                const outputName = `product_slice_${id}.mp4`;
                
                ffmpeg.FS('writeFile', inputName, await fetchFile(videoFile));
                const duration = endTime - startTime;

                // 執行高精確度無損流切片 (-c copy)
                await ffmpeg.run(
                    '-ss', startTime.toFixed(3),
                    '-i', inputName,
                    '-t', duration.toFixed(3),
                    '-c', 'copy',
                    outputName
                );

                const data = ffmpeg.FS('readFile', outputName);
                const sliceBlob = new Blob([data.buffer], { type: 'video/mp4' });
                const downloadUrl = URL.createObjectURL(sliceBlob);

                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${videoFile.name.split('.')[0]}_產品介紹_${id}.mp4`;
                document.body.appendChild(a);
                a.click();
                a.remove();

                URL.revokeObjectURL(downloadUrl);
                ffmpeg.FS('unlink', outputName);
                
            } catch (error) {
                console.error(error);
                alert("切片下載失敗，可能因為格式不相容或瀏覽器記憶體不足。");
            } finally {
                buttonElement.disabled = false;
                buttonElement.textContent = originalBtnText;
                buttonElement.style.background = "var(--success)";
            }
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
